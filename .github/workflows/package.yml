name: Package

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: liveline-native
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: liveline-native/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate package
        run: npm run check

      - name: Inspect packed tarball
        run: npm pack --dry-run
